<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="styles/wildfire.css">
	<title>Wildfire Spread</title>
</head>
<body>
	<main class="wildfire-page">
		<a class="back-link" href="simulation.html">Back to Simulation</a>

		<header class="wildfire-header">
			<h1>Wildfire Spread</h1>
			<p>Starter page for your wildfire simulation.</p>
		</header>

		<section class="wildfire-grid">
			<article class="panel control-panel">
				<h2>Simulation Control</h2>
				<div class="control-buttons">
					<button id="generateBtn" onclick="startSim()">Start</button>
                    <button id="stopBtn" onclick="stopSim()">Stop</button>
                    <button id="resetBtn" onclick="resetSim()">Regenerate</button>
                    <button id="ignite" onclick="startFire()">Ignite</button>
				</div>

				<label class="control-row" for="speedRange">
					<span>Speed: <span id="speedValue"></span></span>
					<input type="range" id="speedRange" min="1" max="500" value="100">
				</label>

				<label class="control-row" for="pRange">
					<span>Spread Probability: <span id="pValue"></span></span>
					<input type="range" id="pRange" min="0" max="1" step="0.05" value="0.5">
				</label>

				<label class="control-row" for="gridSize">
					<span>Grid Size: <span id="gridSizeValue"></span></span>
					<input type="range" id="gridSize" min="10" max="250" value="50">
				</label>

				<label class="control-row" for="denseTreeAmount">
					<span>Dense Areas: <span id="denseTreeAmountValue"></span></span>
					<input type="range" id="denseTreeAmount" min="1" max="5" value="2">
				</label>

				<label class="control-row" for="denseTreeDensity">
					<span>Dense Tree Density: <span id="denseTreeDensityValue"></span></span>
					<input type="range" id="denseTreeDensity" min="10" max="100" value="60">
				</label>

                <div class="control-row-group">
                    <label class="control-row" for="riverWidth">
                        <span>River Width: <span id="riverWidthValue"></span></span>
                        <input type="range" id="riverWidth" min="1" max="5" value="2">
                    </label>

                    <label class="control-checkbox" for="riverToggle">
                        <input type="checkbox" id="riverToggle" checked>
                        <span>Enable River</span>
                    </label>
                </div>
			</article>

			<article class="canvas-shell">
				<canvas id="wildfireCanvas" width="900" height="520" aria-label="Wildfire simulation canvas"></canvas>
			</article>
		</section>
	</main>

	<script src="scripts/wildfire.js"></script>
</body>
</html>
