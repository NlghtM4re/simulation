<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="styles/wildfire.css">
	<title>Wildfire Spread</title>
</head>
<body>
	<main class="wildfire-page">
		<a class="back-link" href="simulation.html">Back to Simulation</a>

		<header class="wildfire-header">
			<h1>Wildfire Spread</h1>
		</header>

		<section class="wildfire-grid">
			<article class="panel control-panel">
				<h2>Simulation Control</h2>
				<div class="control-buttons">
					<button id="generateBtn" onclick="startSim()">Start</button>
                    <button id="stopBtn" onclick="stopSim()">Stop</button>
                    <button id="resetBtn" onclick="resetSim()">Reset</button>
				</div>

				   <label class="control-row" for="speedRange">
					   <span>Fire Spread Interval : <span id="speedValue"></span></span>
					<input type="range" id="speedRange" min="1" max="1000" value="50" step="1">
				   </label>

				   <label class="control-row" for="growSpeedRange">
						<span>Tree Growth Interval : <span id="growSpeedValue"></span></span>
						<input type="range" id="growSpeedRange" min="1" max="1000" value="100" step="1">
					</label>

				<label class="control-row" for="gridSize">
					<span>Grid Size: <span id="gridSizeValue"></span></span>
					<input type="range" id="gridSize" min="10" max="250" value="100">
				</label>

				<label class="control-row" for="igniteRange">
					<span>Lightning Probability: <span id="igniteProb"></span></span>
					<input type="range" id="igniteRange" min="0" max="1" value="0.3" step="0.01">
				</label>

				<label class="control-row" for="windRange">
					<span>Wind Strength: <span id="windValue"></span></span>
					<input type="range" id="windRange" min="0" max="10" value="1" step="0.01">
				</label>
			
				<label class="control-row" for="windFlickerStrengthRange">
					<span>Wind Flicker Strength: <span id="windFlickerStrength"></span></span>
					<input type="range" id="windFlickerStrengthRange" min="1" max="45" value="10" step="1">
				</label>

				   <label class="control-row" for="windDirection">
					   <span>Wind Direction: <span id="windDirectionValue"></span></span>
					   <input type="range" id="windDirection" min="0" max="360" value="0" step="1">
				   </label>
				   <div class="control-row">
					   <label style="display: flex; align-items: center; gap: 0.5em;">
						   <input type="checkbox" id="customWindToggle">
						   Custom Wind Direction
					   </label>
				   </div>

				   <div class="control-row">
					   <label style="display: flex; align-items: center; gap: 0.5em;">
						   <input type="checkbox" id="flickeringWindToggle" checked>
						   Flickering Wind Direction
					   </label>
				   </div>

			</article>

			   <article class="panel wind-panel">
				   <h2>Wind Direction</h2>
				   <div id="windDirectionDisplay" class="compass-container">
					   <div class="compass">
						   <div class="compass-needle" id="compassNeedle"></div>
						   <span class="compass-label compass-n">N</span>
						   <span class="compass-label compass-e">E</span>
						   <span class="compass-label compass-s">S</span>
						   <span class="compass-label compass-w">W</span>
					   </div>
				   </div>
			   </article>

			   <article class="canvas-shell">
				   <canvas id="wildfireCanvas" width="900" height="520" aria-label="Wildfire simulation canvas"></canvas>
			   </article>
		</section>
	</main>

	<script src="scripts/wildfire.js"></script>
</body>
</html>
